function run(){
if(T.editingtheeditor)return;
let ifra=document.querySelector("iframe");
if(ifra){
  ifra.remove();
  T.focus();
}else{
  let n=currentgame()?.name;
  if(n==undefined || n=="Library")return;
  ifra=element("iframe");
  let style=ifra.style;
  style.border=1;
  style.width=innerWidth;
  style.height=innerWidth;
  style.position="fixed";
  style.backgroundColor="pink";
  ifra.contentWindow.eval(`${T.V}${n}()`);
  T.blur();
  setTimeout(()=>{style.zIndex=9;},50);
}
}

function complete(){
let word,wordlength,ftop,found,first=0,last=-1,i=T.S;
while((--i>=0) && /[a-zA-Z0-9.]/.test(T.V[i]));
word=T.V.slice(i+1,T.S),wordlength=word.length;if(wordlength==0)return;
ftop=T.editingtheeditor?1:currentgame()?.ftop;
let look=(s,e,a)=>[...(T.V.slice(s,e).replaceAll(/"([^"]*)"|\/\/.*$/gm,"").matchAll("\\b"+word+"\\w*"))].at(a)?.[0];
for(let f of [[ftop,T.S-wordlength-1,last],[T.S,Infinity,first],[0,ftop,last]]){
  if((found=look(...f))!=undefined)break;
}
if(found==undefined)return;
T.I(found.slice(wordlength));
}

function comment(){
let s=T.V.lastIndexOf("\n",T.S-1)+1;
let e=T.V.indexOf("\n",T.S)+1;
let t=T.V.slice(s,e);
if(t.startsWith("//")){
  T.I("",  s,s+2);T.S=T.E=e-2;
}else{
  T.P=t;
  T.I("//",s,s);  T.S=T.E=e+2;
}
}

function capslock(){
KEYS.filter(k=>!k.f).forEach(k=>k.e.textContent=k.d[k.d.indexOf(k.e.textContent)^1]);
}

function undo(){restore(-1);}
function redo(){restore(1);}
function restore(){
let max=50*2+1,a=[],curr=0;
a.push(striplinesfirstlast(gameprograms));
restore=function(direction){
if(direction===0){//reset
  a.splice(0,Infinity,T.V);
}else if(direction==undefined){//add
  if(a.length==max){a.splice(0,2);curr--;}else{curr++;}
  a.splice(curr,Infinity,curr%2===0?T.V:T.S);
}else{//restore
  if((direction==-1 && curr==0) || (direction==1 && curr==a.length-1))return;
  T.V=a[curr+=(direction*2)];
  T.S=T.E=a[curr-direction];
}
}
}

function highlight(){
if(T.H!==""){T.H="";syncpretty();return;}
let s=T.V,i=T.E;
if(/\w/.test(s[i])){
  if(T.S===T.E){
    while(--i>=0 && /\w/.test(s[i]));
    T.S=i+1;
  }
  while(++i<s.length && /\w/.test(s[i]));
  T.E=i;
}
if(T.S==T.E)return;
T.H=T.V.substring(T.S,T.E);
syncpretty();
}

function copy(){
let s=T.V,i=T.E;
if(/\w/.test(s[i])){//select word
  if(T.S===T.E){
    while(--i>=0 && /\w/.test(s[i]));
    T.S=i+1;
  }
  while(++i<s.length && /\w/.test(s[i]));
  T.E=i;
}else if(s[i]==" "){//spaces
  while(++i<s.length && / /.test(s[i]));
  T.E=i;
}else if((i==0 || s[i-1]=="\n") && s[i]=="\n"){//paragraph
  T.S++;
  i=s.indexOf("\n\n",i+1);
  T.E=i+2;
}else if(s[i]=="\n" && T.S==T.E){//line
  T.E++;
  while(--i>0 && !/\n/.test(s[i]));
  T.S=i+1;
}else if(block(s[i])){//block
  let i2=i;
  i=block(s[i],i,s);
  if(s.slice(i2,i).includes("\n")){//multiline block
    T.S=1+s.lastIndexOf("\n",T.S-1);
    i=1+s.indexOf("\n",i);
  }else{
    i++;
  }
  while("\n"==s[i] && i++);
  T.E=i;
}else{
  T.E++;
}
T.P=T.V.slice(T.S,T.E);
}//end copy

function paste(){
T.I(T.P);
}

function enter(){
if(T.S!=T.E){T.S=T.E;return;}
let i=T.V.slice(T.V.lastIndexOf("\n",T.S-1)+1,T.S+1).search(/\S|\n/);
if(i==-1)i=0;
T.I("\n"+" ".repeat(i));
}

function backspace(){
if(T.S==T.E){//normal
  T.S>0 && T.I("",T.S-1);
}else{//selection is active
  if(/\n/.test(T.V.slice(T.S,T.E))){//it was a line cut
    T.I("");T.S=T.E=T.V.indexOf("\n",T.E)+1;//so probable not pasting in same place
  }else{
    T.I("");
  }
}
}

function left(){arrow(-1);}
function right(){ arrow(1); }
function arrow(direction){
let i=T.E;
i+=direction;
if(i<0 || i>T.V.length){return;}
if(T.S==T.E){T.S=T.E=i;}//normal
else{T.P=T.V.slice(T.S,T.E=i);}//selection is active
}

function diff(a,b,c){
if(c===undefined){return diff(b,a,"<")+"\n"+diff(a,b,">");}
a=stripcomments(a).split("\n");
b=stripcomments(b).split("\n");
let lines=b.filter(o=>!a.includes(o));
return lines.length?lines.map(line=>c+" "+line).join("\n"):c+"no change";
}

let r=element("input",con), rb=element("button",con); r.inputMode="none";  rb.textContent="Replace"; rb.addEventListener("click",replace); rb.disabled=true;
function search(s){
if(s==="")return -1;
s=escapetext(s);
// if(/\w/.test(s))s="\\b"+s+"\\b";
if(/\w/.test(s))s="\\b"+s;
return T.V.slice(T.E).search(s);
}
function disable(){let d=search(f.value)==-1;fb.disabled=d;rb.disabled=d;}

let i=search(f.value);if(i==-1)return;
T.H=f.value;
syncpretty();
T.E=T.S=T.E+i;T.blur();T.focus();T.E=T.S+f.value.length;
}
function replace(){
if(T.V.slice(T.S,T.E)===f.value){T.focus();T.I(r.value);}
disable();
find();
}

function block(a,i,s){
let pairs={"(":")","{":"}","[":"]",'"':'"'};
if(i==undefined){return a in pairs;}
let cnt=1,b=pairs[a];
while(++i<s.length && (cnt+=s[i]===b?-1:s[i]===a?1:0));
return i;
}

function timestamp(){
let time=new Date();
return "FullYear Month Date Hours Minutes Seconds".split(" ").reduce((s,i)=>s+((time["get"+i]()+(i=="Month")).toString().padStart(2,"0")),"");
}

function stripcomments(s){
return s.replace(/^\/\/.*\n/gm,"");
}

function striplinesfirstlast(s){
return s.toString().replace(/^.*|.*$/g,"");
}

function escapetext(text){return text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');}

function currentgame(){
let i=0,s=stripcomments(T.V),ftop,name;
while(i<s.length){
  ftop=i=s.indexOf("{",i)+1;
  name=s.slice(s.lastIndexOf(" ",i)+1,s.lastIndexOf("(",i));
  i=block("{",i,s);
  if(i>=T.S)break;
}
if(name=="" || /\W/.test(name))return undefined;
return {name:name,ftop:ftop,fend:i,body:s.slice(ftop,i)};
}

function loadicons(){
let range=r=>r.flatMap(v=>Array.from({length:v[1]-v[0]+1},(_,i)=>v[0]+i));

let icons=range([[9711,10100],[127744,128764],[128992,130000]]).filter(v=>((measure.innerHTML=String.fromCodePoint(v)) && measure.offsetWidth>8)).reduce((a,v)=>a+"<x>"+String.fromCodePoint(v)+"</x>","");
measure.remove();
return icons;
}

function element(e,p){
if(p) return             p.appendChild(document.createElement(e));
else  return document.body.appendChild(document.createElement(e));

let scale;

function resize(){
let scaleByHeight = ((innerHeight - innerWidth) / keys.rows);
let scaleByWidth = (innerWidth / keys.cols);
let finalScale = Math.min(scaleByHeight, scaleByWidth);
// finalScale=300/keys.cols;//user override
let finalHeight = finalScale * keys.rows;
let finalWidth = finalScale * keys.cols;
scale = finalScale;
keyboard.style.width = `${finalWidth}px`;
keyboard.style.height = `${finalHeight}px`;
keys.filter(k=>!k.e.querySelector("svg")).forEach(k=>{k.e.style.fontSize = `${finalScale * 0.5}px`;});
keys.filter(k=> k.e.querySelector("svg")).forEach(k=>{k.e.children[0].style.width="45%";});
}
new ResizeObserver(resize).observe(document.body);

keys.clicked=(ev)=>{
  let r=Math.floor((ev.y-ev.currentTarget.offsetTop)/(scale));
  let c=Math.floor((ev.x-ev.currentTarget.offsetLeft)/(scale));
  return keys.find(k=>k.r==r && k.c==c);
}

keyboard.timeout=[];
function clear(t){while(t.length && clearTimeout(t.pop()));}
let repeattimeout=500,repeatinterval=100;
keyboard.addEventListener("pointerdown",(ev)=>{
  ev.preventDefault();
  let k=keys.clicked(ev);
  keys.prev=k;
  if(keys.prev==undefined)return;
  if(k.name=="save" || k.name=="capslock")return;//prevent loop
  keyboard.timeout.push(setTimeout(()=>{keyboard.timeout.push(setInterval(()=>{//longpress repeater
    if(k.f){
      k.f[0]();
    }else{
      T.I(k.e.textContent);
    }
  },repeatinterval));},repeattimeout));
},false);

keyboard.addEventListener("pointercancel",()=>clear(keyboard.timeout),false);//hack: fingers>2 will not trigger pointerup
keyboard.addEventListener("pointerup",(ev)=>{
  ev.preventDefault();
  clear(keyboard.timeout);
  let k=keys.clicked(ev);
  if(keys.prev==undefined)return;
  if(k!=undefined && keys.prev.r==k.r && keys.prev.c==k.c){//normal
    if(k.f){
      k.f[0]();
    }else{
      T.I(k.e.textContent);
    }
  }else{//swipeup
    if(keys.prev.d[1]==undefined && keys.prev.f==undefined)return;
    k=keys.prev;
    if(k.f){
      k.f[1]?.();
    }else{
      T.I(k.d[1]);
    }
  }
  k.e.style.backgroundColor=theme.click;
  setTimeout(()=>k.e.style.backgroundColor=theme.keybackground,200);
},false);

return keys;
}//end createkeys

function pretty(s){
let c=(s,color,match)=>s.replace(RegExp(`(${match})`,'g'),`<span style=color:${color}>$1</span>`);
s=s.replace(/</g,'\x1F');
if(T.H!==""){
  let w=T.H;
  w=escapetext(w);
  if(document.activeElement.id=="find"){w="\\b"+w;}
  else if(/\w/.test(w))                {w="\\b"+w+"\\b";}
  s=s.replace(RegExp(`(${w})`,'g'),`<span style=color:red;background:pink;>$1</span>`);
}
s=c(s,theme.pairs,`[(){}[\\]]`);
s=c(s,theme.keywords,`\\b(function|let|if|else|for|forEach|while|true|false|this|return|undefined)\\b`);
s=s.replace(/\x1F/g,'&'+'#60;');
return s;
}

function gameprograms(){









function bike(){
let {random:rnd,sin,cos,atan2,min,max,PI,abs,ceil}=Math,L=Library(),{X,W,H}=L;
let SHAKE=L.Shake(X),HISTORY=L.History(X),BIKE=Bike(),TREES=Trees(),scene=[SHAKE,Sky(),Mountains(),Ground(),TREES,BIKE,HISTORY];
let SPEED=W/300,OFFSET=0,slope,deriv; {let freq=1/100,amp=40,tilt=.5; slope=x=>sin((x+OFFSET)*freq)*amp+(H*.7)+x*tilt,deriv=x=>amp*freq*cos((x+OFFSET)*freq)+tilt;}

(init=()=>{let prev=0;OFFSET=0;scene.forEach(o=>o.reset?.());(loop=curr=>{let dt=min(.1,(curr-prev)/1000)||0;prev=curr;X.save();scene.forEach(o=>o.update(dt));X.restore();requestAnimationFrame(loop)})(0)})();

function Bike(){let o={x:80,y:0,a:0},vy=0,st=1,angle=()=>atan2(deriv(o.x),1); onpointerdown=()=>st==1&&(st=2,vy=-450,o.a-=PI/8);onpointerup=()=>st==2&&(st=3);
return {o,get j(){return st!=1},reset:()=>(st=1,vy=0),update(dt){let gy=slope(o.x)-20,d=o.a-angle();
  st==1?(o.y=gy,o.a=angle()):(vy+=600*dt,o.y+=vy*dt,st==2&&(o.a-=5*dt),o.y>=gy&&(abs(atan2(sin(d),cos(d)))>=PI/4&&(HISTORY.add(-1),SHAKE.set()),st=1,vy=0,o.y=gy));
  X.save();X.translate(o.x,o.y);X.rotate(o.a);X.scale(-1,1);X.font="40px serif";X.textAlign="center";X.textBaseline="middle";X.fillText("🚴",0,0);X.restore()
}}}

function Trees(){let A=[]; 
return {reset:()=>A=Array.from({length:3},(_,i)=>({x:W+i*(W/2),u:0})),update(dt){X.save();X.font="40px serif";X.textAlign="center";X.textBaseline="bottom";
  A.forEach(t=>{t.x-=SPEED*100*dt;t.x<-40&&(t.x=W+rnd()*200,t.u=0);X.fillText("🌲",t.x,slope(t.x));!t.u&&abs(t.x-BIKE.o.x)<30&&(t.u=1,BIKE.j?HISTORY.add(1):(HISTORY.add(-1),SHAKE.set()))});X.restore()
}}}

function Mountains(){let w=W*.8,m=L.shape2([[0,0,1,-2,2,-1,3,-4,4,-2,5,-3,6,-1,8,-7,10,0,0,0,0,W,10,W,10,0]]),ms=Array.from({length:ceil(W/w)+1},(_,i)=>({x:i*w}));
return {update(dt){X.fillStyle="white";ms.forEach(p=>{p.x-=SPEED*20*dt;p.x<-w&&(p.x+=w*ms.length);X.save(); X.translate(p.x, H*.7); X.scale(w/10,w/10); X.fill(m); X.restore();})
}}}


function Ground(){return{update(dt){OFFSET+=SPEED*100*dt;X.fillStyle="tan";X.beginPath();X.moveTo(0,H);for(let x=0;x<=W;x+=10)X.lineTo(x,slope(x));X.lineTo(W,H);X.fill()}}}
function Sky(){return{update:()=>(X.fillStyle="skyblue",X.fillRect(-W,-H,W*3,H*3))}}

}










function defense(){
let {random:rnd,sin,cos,atan2,min,max,PI,hypot,floor}=Math,L=Library(),{X,W,H}=L;
let SHAKE=L.Shake(X),HISTORY=L.History(X),SND=L.Sound(),PARTICLES=L.Particles(X),SPACE=Space(),EARTH=Earth(),scene=[SHAKE,Ground(),SPACE,EARTH,PARTICLES,HISTORY];

(init=()=>{let prev=0,dt;scene.forEach(o=>o.reset?.());(loop=curr=>{if(EARTH.hp<0)return init(); 
  dt=min(.1,(curr-prev)/1000)||0;prev=curr; X.fillStyle="black";X.fillRect(0,0,W,H);X.save();scene.forEach(o=>o.update(dt));X.restore(); requestAnimationFrame(loop)
})(0)})();

function Earth(){
let B=[],hp=10;addEventListener("click",({clientX:x,clientY:y})=>{hp>0&&(B.push({x:W/2,y:H-40,tx:x,ty:y,a:atan2(y-(H-40),x-W/2)}),SND.rocket())});
return {B,get hp(){return hp},damage:()=>(hp--,SHAKE.set()),reset:()=>hp=10,update(dt){
  X.fillStyle="lime";B.forEach((b,i)=>{ b.x+=cos(b.a)*700*dt;b.y+=sin(b.a)*700*dt; X.fillRect(b.x-2,b.y-2,4,4); if(hypot(b.x-b.tx,b.y-b.ty)<15){SPACE.hit(b.x,b.y);B.splice(i,1)} })
}}}

function Space(){
let R=[],level=L.Difficulty({start:0.8,end:15,at:250,be:3}),spawn=(s=2)=>({x:rnd()*W,y:-20,s,a:rnd()*.4-.2,c:`hsl(${rnd()*360},70%,50%)`,r:15+rnd()*10,ir:7+rnd()*5,rot:0});
return {hit(x,y){for(let i=R.length-1;i>=0;i--){let r=R[i];if(hypot(x-r.x,y-r.y)<45){SND.explosion();PARTICLES.add(r.x,r.y);HISTORY.add(1);R.splice(i,1)}}},reset:()=>R=[],update(dt){
  (rnd()<.02*level(HISTORY.score))&&R.push(spawn(1+level(HISTORY.score)/5));
  R.forEach((r,i)=>{
    r.y+=r.s*70*dt;r.x+=sin(r.a)*r.s*30*dt;r.rot+=r.s*dt;
    X.save();X.translate(r.x,r.y);X.rotate(r.rot);X.strokeStyle=r.c;X.lineWidth=2;asteroid(0,0,r.r,r.ir);X.stroke();X.restore();
    if(r.y>H-40){EARTH.damage();PARTICLES.add(r.x,r.y);R.splice(i,1)}
  })
}}}

function Ground(){return {update:()=>(X.fillStyle=`hsl(${EARTH.hp*12},70%,40%)`,X.fillRect(0,H-40,W,40))}}
function asteroid(x,y,r1,r2,p=5){let a=PI/p;X.beginPath();X.moveTo(x,y-r1);for(let i=1;i<p*2;i++){let r=i%2?r2:r1;X.lineTo(x+cos(i*a-PI/2)*r,y+sin(i*a-PI/2)*r)}X.closePath()}

}










function Library(){
function element(tag){return document.body.appendChild(document.createElement(tag));}
let {random:rnd,sin,cos,atan2,min,max,PI}=Math;
oncontextmenu=_=>false; 
element("style").textContent="*{margin:0;padding:0;}canvas{touch-action:none;display:block}";
let X=element("canvas").getContext("2d",{alpha:false});
let W=innerWidth,H=innerHeight;
{let c=X.canvas,s=c.style,d=devicePixelRatio;c.width=W*d;c.height=H*d;s.width=W+"px";s.height=H+"px";X.setTransform(d,0,0,d,0,0);}
function scroll(A,dt,spawn){for(let o of A)o.y+=H/3*dt,o.y>H&&spawn?.(o)}
function shape(a){let p=new Path2D();for(let m of [1,-1]){p.moveTo(m*a[0][0],a[0][1]);for(let i=1;i<a.length;i++)p.bezierCurveTo(m*a[i][0],a[i][1],m*a[i][2],a[i][3],m*a[i][4],a[i][5]);}return p;}
function shape2(a,s=1){return a.reduce((p,i)=>(i.length&&(p.moveTo(s*i[0],s*i[1]),i.slice(2).forEach((x,j)=>j%2||p.lineTo(s*x,s*i[j+3]))),p),new Path2D)}
function History(X){let A=[];return{get score(){return A[0]},add:v=>A[0]+=v,reset(){A.unshift(0)},update(){X.fillStyle="white";X.font="10px monospace";["Score",...A].forEach((v,i)=>X.fillText(v,20,i*12+60))}}}
function Difficulty(p){let start=p.start,end=p.end,at=p.at,be=p.be;return function(x){return end-(end-start)*((end-be)/(end-start))**(x/at);}}
function Shake(X){let s=0;return{set:()=>s=40,update:(dt)=>s&&(s=.02**dt*s|0,X.translate((rnd()-.5)*s,(rnd()-.5)*s))}}

function Sound(){let b=new AudioContext(); [.2,1].forEach((v,i)=>(b[i+1]=b.createBuffer(1,b.sampleRate*v,b.sampleRate)).getChannelData(0).forEach((_,i,a)=>a[i]=rnd()*2-1))
return {
  rocket:()=>{let s=b.createBufferSource();s.buffer=b[1];s.connect(b.destination);s.start()},
  explosion:()=>{let s=b.createBufferSource(),g=b.createGain(),f=b.createBiquadFilter();s.buffer=b[2];g.gain.value=8;f.type="lowpass";f.frequency.value=300;g.gain.linearRampToValueAtTime(0,b.currentTime+1);s.connect(f).connect(g).connect(b.destination);s.start()}
}}

function Particles(X){let A=[];
return {add(x,y){for(let i=60;i--;){let a=rnd()*7,s=rnd()*4+1;A.push({x,y,v:cos(a)*s,w:sin(a)*s,l:1})}}, update(dt){
  A=A.filter(p=>(p.l-=.8*dt)>0); A.forEach(p=>{p.x+=p.v;p.y+=p.w+=.1;X.fillStyle=`hsla(${p.l*60},100%,50%,${p.l})`;X.beginPath();X.arc(p.x,p.y,2,0,7);X.fill()})
}}}

return {X,W,H,scroll,shape,shape2,History,Difficulty,Shake,Sound,Particles}
}

}
